name: azure-integration-local-devkit

services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: azurite
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0"
    ports:
      - "10000:10000" # Blob
      - "10001:10001" # Queue
      - "10002:10002" # Table
    volumes:
      - azurite-data:/data

  wiremock:
    image: wiremock/wiremock:latest
    container_name: wiremock
    ports:
      - "8081:8080"
    volumes:
      - ./mock-api/wiremock/mappings:/home/wiremock/mappings
      - ./mock-api/wiremock/__files:/home/wiremock/__files
    command:
      - "--verbose"

  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    container_name: servicebus-emulator
    pull_policy: always
    ports:
      - "5672:5672"
      - "5300:${EMULATOR_HTTP_PORT:-5300}"
    volumes:
      - ./servicebus/Config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    environment:
      SQL_SERVER: mssql
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Your_strong_password123!}
      ACCEPT_EULA: ${ACCEPT_EULA:-Y}
      EMULATOR_HTTP_PORT: ${EMULATOR_HTTP_PORT:-5300}
      SQL_WAIT_INTERVAL: ${SQL_WAIT_INTERVAL:-15}
    depends_on:
      - mssql
    networks:
      local-devkit:
        aliases:
          - servicebus-emulator
          - sb-emulator

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: servicebus-mssql
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA:-Y}
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Your_strong_password123!}
    networks:
      local-devkit:
        aliases:
          - mssql

networks:
  local-devkit:

volumes:
  azurite-data:
